<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>VibeTower</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; touch-action: none; }
    #game-canvas { width: 100%; height: 100%; display: block; touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; }
  </style>
  <script type="importmap">
    {
      "imports": {
        "three": "https://esm.sh/three@0.171.0",
        "three/addons/": "https://esm.sh/three@0.171.0/examples/jsm/"
      }
    }
  </script>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <script>
    // Scale the vibejam widget when it appears in the DOM
    new MutationObserver(function(mutations, obs) {
      for (var m of mutations) {
        for (var node of m.addedNodes) {
          if (node.nodeType !== 1) continue;
          // Look for the widget by checking for jam/pieter links inside it
          if (node.querySelector && (
            node.querySelector('a[href*="jam.pieter"]') ||
            node.querySelector('a[href*="vibejam"]') ||
            node.querySelector('a[href*="vibecodejam"]') ||
            (node.tagName === 'A' && node.href && node.href.includes('jam'))
          )) {
            node.style.transform = 'scale(0.75)';
            node.style.transformOrigin = 'bottom right';
            obs.disconnect();
            return;
          }
        }
      }
    }).observe(document.body, { childList: true, subtree: true });
  </script>
  <script async src="https://jam.pieter.com/2026/widget.js"></script>
  <script src="config.js"></script>
  <script>
    if (window.GTAG_ID) {
      var s = document.createElement('script');
      s.async = true;
      s.src = 'https://www.googletagmanager.com/gtag/js?id=' + window.GTAG_ID;
      document.head.appendChild(s);
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', window.GTAG_ID);
    }
  </script>
  <script type="module" src="src/main.js"></script>
</body>
</html>
